<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Profile | InkWell</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div id="navbarPlaceholder"></div>

  <div class="container" style="padding-top: 110px; padding-bottom: 60px; max-width: 650px;">
    <div class="glass-panel">
      <div class="text-center mb-4">
        <div class="avatar-circle mx-auto" style="width: 80px; height: 80px; font-size: 2rem;" id="profileInitial"></div>
        <h4 class="fw-bold mt-3" id="profileNameDisplay"></h4>
        <p class="text-muted" id="profileEmailDisplay"></p>
      </div>

      <form id="profileForm">
        <div class="mb-3">
          <label class="form-label fw-semibold">Full Name</label>
          <input type="text" class="form-control" id="profileName" required />
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Bio</label>
          <textarea class="form-control" id="profileBio" rows="3" placeholder="Tell readers about yourself..." maxlength="300"></textarea>
        </div>
        <button type="submit" class="btn btn-gradient w-100 py-2">
          <i class="bi bi-check-circle me-1"></i> Save Changes
        </button>
      </form>
    </div>
  </div>

  <div id="footerPlaceholder"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/profile.js"></script>
</body>
</html>
