<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog Post | InkWell</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div id="navbarPlaceholder"></div>

  <div class="container" style="padding-top: 110px; padding-bottom: 60px; max-width: 850px;">

    <div id="loadingSpinner" class="loading-wrapper">
      <div class="spinner-gradient"></div>
    </div>

    <article id="blogArticle" class="d-none">
      <span class="badge-category" id="blogCategory"></span>
      <h1 class="fw-bold mt-3" id="blogTitle"></h1>
      <div class="d-flex align-items-center gap-3 text-muted mb-4">
        <span><i class="bi bi-person-circle me-1"></i><span id="blogAuthor"></span></span>
        <span><i class="bi bi-calendar3 me-1"></i><span id="blogDate"></span></span>
      </div>
      <img id="blogCoverImage" src="" class="img-fluid rounded-xl mb-4 w-100" style="max-height: 420px; object-fit: cover;" alt="" />
      <div class="single-blog-content" id="blogContent"></div>

      <hr class="my-5" />

      <!-- Comments Section -->
      <h4 class="fw-bold mb-4"><i class="bi bi-chat-dots me-2"></i>Comments (<span id="commentCount">0</span>)</h4>

      <div id="commentFormWrapper" class="mb-4">
        <form id="commentForm">
          <div class="mb-2">
            <textarea class="form-control" id="commentText" rows="3" placeholder="Share your thoughts..." required></textarea>
          </div>
          <button type="submit" class="btn btn-gradient">
            <i class="bi bi-send me-1"></i> Post Comment
          </button>
        </form>
      </div>

      <div id="loginToCommentMsg" class="d-none alert alert-light border rounded-xl">
        <i class="bi bi-info-circle me-1"></i> <a href="login.html">Login</a> to join the conversation.
      </div>

      <div id="commentsList"></div>
    </article>

  </div>

  <div id="footerPlaceholder"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/blog.js"></script>
</body>
</html>
