<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard | InkWell</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div id="navbarPlaceholder"></div>

  <div class="container" style="padding-top: 110px; padding-bottom: 60px;">
    <div class="row mb-4">
      <div class="col-12">
        <h2 class="section-title">Welcome back, <span id="welcomeName" class="gradient-text"></span> 👋</h2>
        <p class="section-subtitle mb-0">Manage your blog posts from your personal dashboard</p>
      </div>
    </div>

    <!-- Stat Cards -->
    <div class="row g-4 mb-5">
      <div class="col-md-4">
        <div class="stat-card">
          <div class="stat-icon"><i class="bi bi-journal-text"></i></div>
          <h3 id="totalBlogsCount">0</h3>
          <p class="text-muted mb-0">Total Blogs</p>
        </div>
      </div>
      <div class="col-md-4">
        <div class="stat-card">
          <div class="stat-icon" style="background: linear-gradient(135deg,#00cec9,#55efc4);"><i class="bi bi-chat-dots"></i></div>
          <h3 id="totalCommentsCount">0</h3>
          <p class="text-muted mb-0">Total Comments Received</p>
        </div>
      </div>
      <div class="col-md-4">
        <div class="stat-card">
          <div class="stat-icon" style="background: linear-gradient(135deg,#fd79a8,#fab1a0);"><i class="bi bi-calendar-check"></i></div>
          <h3 id="latestPostDate">--</h3>
          <p class="text-muted mb-0">Latest Post</p>
        </div>
      </div>
    </div>

    <!-- Create New Blog Button -->
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h4 class="fw-bold mb-0">My Blog Posts</h4>
      <button class="btn btn-gradient" data-bs-toggle="modal" data-bs-target="#blogModal" id="newBlogBtn">
        <i class="bi bi-plus-circle me-1"></i> New Blog
      </button>
    </div>

    <!-- Loading Spinner -->
    <div id="loadingSpinner" class="loading-wrapper">
      <div class="spinner-gradient"></div>
    </div>

    <!-- My Blogs Grid -->
    <div class="row g-4" id="myBlogsContainer"></div>

    <!-- Empty State -->
    <div id="emptyState" class="empty-state d-none">
      <i class="bi bi-journal-plus"></i>
      <h5>You haven't written any blogs yet</h5>
      <p>Click "New Blog" to publish your first story.</p>
    </div>
  </div>

  <!-- Create / Edit Blog Modal -->
  <div class="modal fade" id="blogModal" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-centered">
      <div class="modal-content rounded-xl">
        <div class="modal-header border-0">
          <h5 class="modal-title fw-bold" id="blogModalTitle">Create New Blog</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <form id="blogForm">
            <input type="hidden" id="blogId" />
            <div class="mb-3">
              <label class="form-label fw-semibold">Title</label>
              <input type="text" class="form-control" id="blogTitle" placeholder="Enter a catchy title" required />
            </div>
            <div class="row">
              <div class="col-md-6 mb-3">
                <label class="form-label fw-semibold">Category</label>
                <select id="blogCategory" class="form-select">
                  <option value="General">General</option>
                  <option value="Technology">Technology</option>
                  <option value="Lifestyle">Lifestyle</option>
                  <option value="Travel">Travel</option>
                  <option value="Food">Food</option>
                </select>
              </div>
              <div class="col-md-6 mb-3">
                <label class="form-label fw-semibold">Cover Image URL (optional)</label>
                <input type="text" class="form-control" id="blogCoverImage" placeholder="https://..." />
              </div>
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">Content</label>
              <textarea class="form-control" id="blogContent" rows="8" placeholder="Write your story here..." required></textarea>
            </div>
            <button type="submit" class="btn btn-gradient w-100 py-2" id="blogSubmitBtn">
              <i class="bi bi-check-circle me-1"></i> Publish Blog
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <div id="footerPlaceholder"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
